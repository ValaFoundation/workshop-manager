name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          dnf -y update
          dnf -y install \
            ca-certificates \
            curl \
            git \
            meson \
            ninja-build \
            vala \
            pkgconf-pkg-config \
            gettext \
            glib2-devel \
            libgee-devel \
            json-glib-devel \
            libsoup3-devel \
            libarchive-devel \
            libadwaita-devel

      - name: Install Vamposer
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/vamposer https://github.com/ValaFoundation/vamposer/releases/latest/download/vamposer-linux
          curl -fsSL -o /tmp/vamposer-linux.sha256 https://github.com/ValaFoundation/vamposer/releases/latest/download/vamposer-linux.sha256
          expected_sha="$(awk '{print $1}' /tmp/vamposer-linux.sha256)"
          actual_sha="$(sha256sum /usr/local/bin/vamposer | awk '{print $1}')"
          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Checksum mismatch while installing vamposer"
            exit 1
          fi
          chmod +x /usr/local/bin/vamposer

      - name: Install vamposer dependencies
        run: vamposer install --dev

      - name: Configure project
        run: meson setup builddir

      - name: Build project
        run: meson compile -C builddir

      - name: Run tests
        run: meson test -C builddir --print-errorlogs
