name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          dnf -y update
          dnf -y install \
            ca-certificates \
            curl \
            git \
            meson \
            ninja-build \
            vala \
            pkgconf-pkg-config \
            gettext \
            desktop-file-utils \
            glib2-devel \
            libgee-devel \
            json-glib-devel \
            libsoup3-devel \
            libarchive-devel \
            libadwaita-devel

      - name: Setup Vamposer
        uses: ValaFoundation/vamposer@master
        with:
          version: latest

      - name: Install vamposer dependencies
        run: vamposer install --dev

      - name: Configure project
        run: meson setup builddir

      - name: Build project
        run: meson compile -C builddir

      - name: Run tests
        run: meson test -C builddir --print-errorlogs
